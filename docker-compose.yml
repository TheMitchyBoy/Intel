services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: intel
      POSTGRES_PASSWORD: intel_secret
      POSTGRES_DB: intel_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intel -d intel_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      args:
        VITE_API_KEY: ${API_KEY:-dev-api-key}
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://intel:intel_secret@db:5432/intel_db
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      API_KEY: ${API_KEY:-dev-api-key}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./config:/app/config:ro
    command: uvicorn src.api.server:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_KEY: ${API_KEY:-dev-api-key}
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy

  scraper:
    build:
      context: .
      args:
        VITE_API_KEY: ${API_KEY:-dev-api-key}
    environment:
      DATABASE_URL: postgresql://intel:intel_secret@db:5432/intel_db
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SCRAPE_SCHEDULE_ENABLED: ${SCRAPE_SCHEDULE_ENABLED:-true}
      SCRAPE_SCHEDULE_HOUR: ${SCRAPE_SCHEDULE_HOUR:-6}
      SCRAPE_TIMEZONE: ${SCRAPE_TIMEZONE:-America/Sitka}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./config:/app/config:ro
    command: python -m src.main scheduler

volumes:
  postgres_data:
