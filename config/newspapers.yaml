# Ketchikan Daily News — https://www.ketchikandailynews.com/
# Powered by BLOX/TNCMS. RSS feeds use ?f=rss on section pages.

sources:
  - name: "Ketchikan Daily News"
    url: "https://www.ketchikandailynews.com/search/?f=rss"
    type: rss
    enabled: true
    region: "Ketchikan, AK"
    request_delay_seconds: 3
    filters:
      url_must_contain: "/article_"
      url_must_not_contain: "/image_"
    selectors:
      content: "#article-body, [itemprop='articleBody'], .asset-body, .subscriber-preview"

  - name: "Ketchikan Daily News - Local"
    url: "https://www.ketchikandailynews.com/news/local/?f=rss"
    type: rss
    enabled: true
    region: "Ketchikan, AK"
    request_delay_seconds: 3
    filters:
      url_must_contain: "/article_"
      url_must_not_contain: "/image_"
    selectors:
      content: "#article-body, [itemprop='articleBody'], .asset-body, .subscriber-preview"

  - name: "Ketchikan Daily News - Sports"
    url: "https://www.ketchikandailynews.com/news/sports/?f=rss"
    type: rss
    enabled: true
    region: "Ketchikan, AK"
    request_delay_seconds: 3
    filters:
      url_must_contain: "/article_"
      url_must_not_contain: "/image_"
    selectors:
      content: "#article-body, [itemprop='articleBody'], .asset-body, .subscriber-preview"

  - name: "Ketchikan Daily News - Obituaries"
    url: "https://www.ketchikandailynews.com/obituaries/?f=rss"
    type: rss
    enabled: true
    region: "Ketchikan, AK"
    request_delay_seconds: 3
    filters:
      url_must_contain: "/article_"
      url_must_not_contain: "/image_"
    selectors:
      content: "#article-body, [itemprop='articleBody'], .asset-body, .subscriber-preview"

scraper:
  max_articles_per_source: 15
  request_delay_seconds: 3
  lookback_days: 7
